<!DOCTYPE html>
<html>
<head>
<title>Relaxar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background: linear-gradient(to bottom, #87CEEB, #4fa3d1);
}

#inicio, #site{
text-align:center;
padding-top:60px;
}
#site{display:none;}

#layout{
display:flex;
flex-direction:column;
height:100vh;
}

#menu{
background:#222;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:5px;
}

#menu button{
padding:8px;
border:none;
border-radius:5px;
}

#conteudo{
flex:1;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.bolha{
width:20px;height:20px;
background:rgba(255,255,255,0.6);
border-radius:50%;
position:absolute;
transition:0.2s;
}

.desenho{
width:6px;height:6px;
background:black;
position:absolute;
border-radius:50%;
}
</style>

<script>
let bolhasAtivas = 0;
let maxBolhas = 60;
let podeTempestade = true;

/* desenho */
let desenhando = false;
let modoBorracha = false;

/* início */
function iniciar(){
let t = document.getElementById("texto");

t.innerText = "Segure a respiração...";

setTimeout(()=>{
t.innerText = "Agora solte a respiração...";
},2000);

setTimeout(()=>{
document.getElementById("inicio").style.display="none";
document.getElementById("site").style.display="block";
},4000);
}

/* limpar */
function limpar(){
conteudo.innerHTML="<h2>Bem-vindo</h2><p>Escolha um modo relaxante</p>";
conteudo.onclick=null;
conteudo.onmousemove=null;
conteudo.ontouchmove=null;
conteudo.onmousedown=null;
conteudo.onmouseup=null;
conteudo.ontouchstart=null;
conteudo.ontouchend=null;

if(window.intervaloAtual){
clearInterval(window.intervaloAtual);
}

bolhasAtivas = 0;
}

/* posição */
function pegarPos(e){
let touch = e.touches ? e.touches[0] : e;
let rect = conteudo.getBoundingClientRect();

return {
x: touch.clientX - rect.left,
y: touch.clientY - rect.top
};
}

/* bolhas */
function criarBolha(x,y){
if(bolhasAtivas > maxBolhas) return;

bolhasAtivas++;

let b=document.createElement("div");
b.className="bolha";
b.style.left=x+"px";
b.style.top=y+"px";
conteudo.appendChild(b);

b.onclick = function(ev){
ev.stopPropagation();

try{
let som = new Audio("pop.mp3");
som.volume = 0.4;
som.play();
}catch{}

b.style.transform="scale(2)";
b.style.opacity="0";

setTimeout(()=>{
b.remove();
bolhasAtivas--;
},200);
};

let subir=setInterval(()=>{
y-=1;
b.style.top=y+"px";

if(y<50){
b.remove();
clearInterval(subir);
bolhasAtivas--;
}
},30);
}

function bolhas(){
limpar();

conteudo.onclick = function(e){
let pos = pegarPos(e);
criarBolha(pos.x,pos.y);
};
}

/* tempestade */
function tempestade(){
if(!podeTempestade) return;

podeTempestade = false;

limpar();

window.intervaloAtual = setInterval(()=>{
for(let i=0;i<3;i++){
let x = Math.random()*conteudo.clientWidth;
let y = conteudo.clientHeight;
criarBolha(x,y);
}
},200);

setTimeout(()=>{
podeTempestade = true;
},5000);
}

/* DESENHAR MELHORADO */
function desenhar(){
limpar();

/* criar botão */
conteudo.innerHTML = `
<h2>Modo Desenho</h2>
<button onclick="modoBorracha=false">Caneta</button>
<button onclick="modoBorracha=true">Borracha</button>
`;

function desenharPonto(e){
if(!desenhando) return;

let pos = pegarPos(e);

/* borracha */
if(modoBorracha){
let elementos = document.querySelectorAll(".desenho");
elementos.forEach(el=>{
let x = parseInt(el.style.left);
let y = parseInt(el.style.top);

if(Math.abs(x - pos.x) < 10 && Math.abs(y - pos.y) < 10){
el.remove();
}
});
return;
}

/* desenhar */
let d=document.createElement("div");
d.className="desenho";
d.style.left=pos.x+"px";
d.style.top=pos.y+"px";

conteudo.appendChild(d);
}

/* mouse */
conteudo.onmousedown = ()=>desenhando=true;
conteudo.onmouseup = ()=>desenhando=false;
conteudo.onmouseleave = ()=>desenhando=false;
conteudo.onmousemove = desenharPonto;

/* mobile */
conteudo.ontouchstart = ()=>desenhando=true;
conteudo.ontouchend = ()=>desenhando=false;
conteudo.ontouchmove = desenharPonto;
}
</script>

</head>

<body>

<div id="inicio">
<h1 id="texto">Clique para começar</h1>
<button onclick="iniciar()">Começar</button>
</div>

<div id="site">

<div id="layout">

<div id="menu">
<button onclick="bolhas()">Bolhas</button>
<button onclick="tempestade()">Tempestade de Bolhas</button>
<button onclick="desenhar()">Desenhar</button>

<audio id="som" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('som').play()">Música</button>
<button onclick="document.getElementById('som').pause()">Parar</button>
</div>

<div id="conteudo">
<h2>Bem-vindo</h2>
<p>Escolha um modo relaxante</p>
</div>

</div>

</div>

</body>
</html>
