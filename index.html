<!DOCTYPE html>
<html>
<head>
<title>Relaxar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background: linear-gradient(to bottom, #87CEEB, #4fa3d1);
}

#inicio, #site{
text-align:center;
padding-top:60px;
}

#site{display:none;}

#layout{
display:flex;
flex-direction:column;
height:100vh;
}

#menu{
background:#222;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:5px;
}

#menu button{
padding:8px;
border:none;
border-radius:5px;
}

#conteudo{
flex:1;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* bolhas */
.bolha{
width:20px;
height:20px;
background:rgba(255,255,255,0.6);
border-radius:50%;
position:absolute;
}

/* gato */
#gato{
position:absolute;
bottom:60px;
right:10px;
width:90px;
cursor:pointer;
}

/* saco */
#saco{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
width:90px;
display:none;
cursor:pointer;
}
</style>

<script>
let conteudo;

let bolhasAtivas = 0;
let maxBolhas = 60;
let podeTempestade = true;

let somGato = new Audio("cat.mp3");
let somPop = new Audio("pop.mp3");
let somImpacto = new Audio("impacto.mp3");

somGato.volume=0.5;
somPop.volume=0.4;
somImpacto.volume=0.5;

let musica = new Audio("music.mp3");
musica.loop=true;
let musicaLigada=false;

/* INÍCIO LIMPO */
function iniciar(){
let t=document.getElementById("texto");

t.innerText="Segure a respiração...";

setTimeout(()=>{
t.innerText="Agora solte a respiração...";
},2000);

setTimeout(()=>{
document.getElementById("inicio").style.display="none";
document.getElementById("site").style.display="block";

conteudo=document.getElementById("conteudo");

initGato();
},4000);
}

/* GATO */
function initGato(){
let gato=document.getElementById("gato");

gato.onclick=()=>{
somGato.currentTime=0;
somGato.play();

gato.style.transform="scale(1.15)";
setTimeout(()=>gato.style.transform="scale(1)",150);
};
}

/* BOLHAS */
function criarBolha(x,y){
if(bolhasAtivas>=maxBolhas) return;

bolhasAtivas++;

let b=document.createElement("div");
b.className="bolha";
b.style.left=x+"px";
b.style.top=y+"px";
conteudo.appendChild(b);

b.onclick=(e)=>{
e.stopPropagation();

somPop.currentTime=0;
somPop.play();

b.remove();
bolhasAtivas--;
};

let up=setInterval(()=>{
y--;
b.style.top=y+"px";

if(y<50){
b.remove();
clearInterval(up);
bolhasAtivas--;
}
},30);
}

function bolhas(){
conteudo.onclick=(e)=>{
let r=conteudo.getBoundingClientRect();
criarBolha(e.clientX-r.left,e.clientY-r.top);
};
}

/* TEMPESTADE */
function tempestade(){
if(!podeTempestade) return;
podeTempestade=false;

let loop=setInterval(()=>{
for(let i=0;i<3;i++){
criarBolha(Math.random()*conteudo.clientWidth,conteudo.clientHeight);
}
},200);

setTimeout(()=>{
clearInterval(loop);
podeTempestade=true;
},5000);
}

/* SACO */
let sacoAtivo=false;

function toggleSaco(){
let s=document.getElementById("saco");

sacoAtivo=!sacoAtivo;
s.style.display=sacoAtivo?"block":"none";
document.getElementById("btnSaco").innerText=
sacoAtivo?"Tirar saco de pancadas":"Colocar saco de pancadas";
}

function bater(){
let s=document.getElementById("saco");

somImpacto.currentTime=0;
somImpacto.play();

s.style.transform="translateX(-50%) scale(0.9)";
setTimeout(()=>s.style.transform="translateX(-50%) scale(1)",120);
}

/* MÚSICA */
function toggleMusica(){
musicaLigada=!musicaLigada;

if(musicaLigada){
musica.play();
document.getElementById("btnMusica").innerText="Parar música";
}else{
musica.pause();
document.getElementById("btnMusica").innerText="Tocar música";
}
}
</script>
</head>

<body>

<div id="inicio">
<h1 id="texto">Bem-vindo</h1>
<button onclick="iniciar()">Começar</button>
</div>

<div id="site">
<div id="layout">

<div id="menu">
<button onclick="bolhas()">Bolhas</button>
<button onclick="tempestade()">Tempestades de bolhas</button>
<button id="btnSaco" onclick="toggleSaco()">Colocar saco de pancadas</button>
<button id="btnMusica" onclick="toggleMusica()">Tocar música</button>
</div>

<div id="conteudo">

<h2>Escolha um modo</h2>

<img id="saco" src="saco.png" onclick="bater()">
<img id="gato" src="cat.png">

</div>

</div>
</div>

</body>
</html>
